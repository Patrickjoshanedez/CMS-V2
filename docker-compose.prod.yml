services:
  mongodb:
    image: mongo:7
    container_name: cms-mongodb-prod
    restart: unless-stopped
    volumes:
      - mongodb_prod_data:/data/db

  redis:
    image: redis:7-alpine
    container_name: cms-redis-prod
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --requirepass
      - ${REDIS_PASSWORD:?REDIS_PASSWORD must be non-empty}
    volumes:
      - redis_prod_data:/data

  server:
    build:
      context: .
      dockerfile: Dockerfile.server.prod
    container_name: cms-server-prod
    restart: unless-stopped
    depends_on:
      - mongodb
      - redis
      - plagiarism_api
    env_file:
      - .env.prod
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: ${MONGODB_URI:-mongodb://mongodb:27017/cms_v2}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD?REDIS_PASSWORD is required}
      CLIENT_URL: ${CLIENT_URL?CLIENT_URL is required}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET?JWT_ACCESS_SECRET is required}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET?JWT_REFRESH_SECRET is required}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      OTP_EXPIRES_MINUTES: ${OTP_EXPIRES_MINUTES:-10}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@cms-buksu.edu.ph}
      S3_BUCKET: ${S3_BUCKET:-cms-buksu-uploads}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-false}
      ALLOW_PRODUCTION_S3_BUCKET_OVERRIDE: ${ALLOW_PRODUCTION_S3_BUCKET_OVERRIDE:-false}

      # === Plagiarism Detection (Production Thresholds) ===
      PLAGIARISM_ENGINE_URL: http://plagiarism_api:8001
      PLAGIARISM_WARNING_THRESHOLD: ${PLAGIARISM_WARNING_THRESHOLD:-25}
      PLAGIARISM_REJECT_THRESHOLD: ${PLAGIARISM_REJECT_THRESHOLD:-40}
      PLAGIARISM_ENGINE_TIMEOUT: ${PLAGIARISM_ENGINE_TIMEOUT:-180000}
      PLAGIARISM_POLL_INTERVAL: ${PLAGIARISM_POLL_INTERVAL:-3000}
      PLAGIARISM_POLL_MAX_ATTEMPTS: ${PLAGIARISM_POLL_MAX_ATTEMPTS:-60}
      RECAPTCHA_SECRET_KEY: ${RECAPTCHA_SECRET_KEY:-}
      GOOGLE_AUTH_CLIENT_ID: ${GOOGLE_AUTH_CLIENT_ID:-}
      GOOGLE_AUTH_CLIENT_SECRET: ${GOOGLE_AUTH_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-}
      GOOGLE_REFRESH_TOKEN: ${GOOGLE_REFRESH_TOKEN:-}
      GOOGLE_SERVICE_ACCOUNT_EMAIL: ${GOOGLE_SERVICE_ACCOUNT_EMAIL:-}
      GOOGLE_SERVICE_ACCOUNT_PRIVATE_KEY: ${GOOGLE_SERVICE_ACCOUNT_PRIVATE_KEY:-}
      GOOGLE_DRIVE_FOLDER_ID: ${GOOGLE_DRIVE_FOLDER_ID:-}
      GOOGLE_DRIVE_CAPSTONE_DOCS_FOLDER_ID: ${GOOGLE_DRIVE_CAPSTONE_DOCS_FOLDER_ID:-}
      GOOGLE_DRIVE_TEMPLATE_FOLDER_ID: ${GOOGLE_DRIVE_TEMPLATE_FOLDER_ID:-}
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '1.50'
          memory: 1.5G
        reservations:
          cpus: '0.50'
          memory: 512M

  client:
    build:
      context: .
      dockerfile: Dockerfile.client.prod
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
        VITE_RECAPTCHA_SITE_KEY: ${VITE_RECAPTCHA_SITE_KEY:-}
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:-}
        VITE_GOOGLE_ALLOWED_ORIGINS: ${VITE_GOOGLE_ALLOWED_ORIGINS:-}
        VITE_RECAPTCHA_ENABLED: ${VITE_RECAPTCHA_ENABLED:-false}
    container_name: cms-client-prod
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "8080:80"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    read_only: true
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /var/run
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '0.75'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M

  ngrok:
    image: ngrok/ngrok:3.37.3-alpine
    container_name: cms-ngrok-prod
    restart: unless-stopped
    profiles:
      - public-exposure
    env_file:
      - .env.prod
    entrypoint:
      - /bin/sh
      - -ec
    command:
      - |
        test -n "$${NGROK_AUTHTOKEN}" || { echo "missing NGROK_AUTHTOKEN"; exit 1; }
        test -n "$${NGROK_DOMAIN}" || { echo "missing NGROK_DOMAIN"; exit 1; }
        if test -n "$${NGROK_OAUTH_PROVIDER}"; then
          set -f
          set -- ngrok http client:80 "--url=https://$${NGROK_DOMAIN}" "--oauth=$${NGROK_OAUTH_PROVIDER}"
          oauth_allow_count=0

          if test -n "$${NGROK_OAUTH_ALLOW_EMAILS}"; then
            for email in $$(printf '%s' "$${NGROK_OAUTH_ALLOW_EMAILS}" | tr ',' ' '); do
              email=$$(printf '%s' "$$email" | tr -d '[:space:]')
              if test -n "$$email"; then
                set -- "$$@" "--oauth-allow-email=$$email"
                oauth_allow_count=$$((oauth_allow_count + 1))
              fi
            done
          fi

          if test -n "$${NGROK_OAUTH_ALLOW_DOMAINS}"; then
            for domain in $$(printf '%s' "$${NGROK_OAUTH_ALLOW_DOMAINS}" | tr ',' ' '); do
              domain=$$(printf '%s' "$$domain" | tr -d '[:space:]')
              if test -n "$$domain"; then
                set -- "$$@" "--oauth-allow-domain=$$domain"
                oauth_allow_count=$$((oauth_allow_count + 1))
              fi
            done
          fi

          test "$$oauth_allow_count" -gt 0 || {
            echo "missing NGROK_OAUTH_ALLOW_EMAILS or NGROK_OAUTH_ALLOW_DOMAINS for OAuth policy";
            exit 1;
          }

          exec "$$@"
        fi

        test -n "$${NGROK_BASIC_AUTH}" || {
          echo "missing NGROK_BASIC_AUTH (fallback) or NGROK_OAUTH_PROVIDER";
          exit 1;
        }
        exec ngrok http client:80 --url="https://$${NGROK_DOMAIN}" --basic-auth="$${NGROK_BASIC_AUTH}"
    depends_on:
      - client
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    volumes:
      - ngrok_prod_data:/var/lib/ngrok
    tmpfs:
      - /tmp

  # === Plagiarism Detection Services (Production Configuration) ===

  plagiarism_api:
    build:
      context: ./plagiarism_engine
      dockerfile: Dockerfile
      args:
        TORCH_VARIANT: ${PLAGIARISM_TORCH_VARIANT:-cu121}
    container_name: cms-plagiarism-api-prod
    restart: unless-stopped
    depends_on:
      - redis
      - chromadb
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - ANONYMIZED_TELEMETRY=FALSE
      - LOG_LEVEL=WARNING
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD_URLENC}@redis:6379/1
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD_URLENC}@redis:6379/1
      - LOG_JSON=true
      - EMBEDDING_DEVICE=${PLAGIARISM_EMBEDDING_DEVICE:-auto}
      - EMBEDDING_BATCH_SIZE=${PLAGIARISM_EMBEDDING_BATCH_SIZE:-16}
      - OMP_NUM_THREADS=${PLAGIARISM_OMP_NUM_THREADS:-2}
      - MKL_NUM_THREADS=${PLAGIARISM_MKL_NUM_THREADS:-2}
      - TORCH_NUM_THREADS=${PLAGIARISM_TORCH_NUM_THREADS:-2}
      - MAX_DOCUMENT_SIZE=20971520 # 20MB
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 1.5G
        reservations:
          cpus: '1.0'
          memory: 1G
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8001/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  plagiarism_worker:
    build:
      context: ./plagiarism_engine
      dockerfile: Dockerfile
      args:
        TORCH_VARIANT: ${PLAGIARISM_TORCH_VARIANT:-cu121}
    container_name: cms-plagiarism-worker-prod
    restart: unless-stopped
    command: >
      celery -A plagiarism_engine.tasks worker --loglevel=warning --concurrency=${PLAGIARISM_WORKER_CONCURRENCY:-2} --max-tasks-per-child=${PLAGIARISM_MAX_TASKS_PER_CHILD:-100} --prefetch-multiplier=${PLAGIARISM_PREFETCH_MULTIPLIER:-1}
    healthcheck:
      test: [ "CMD-SHELL", "celery -A plagiarism_engine.tasks inspect ping -d celery@$$HOSTNAME || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      - redis
      - chromadb
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - ANONYMIZED_TELEMETRY=FALSE
      - LOG_LEVEL=WARNING
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD_URLENC}@redis:6379/1
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD_URLENC}@redis:6379/1
      - EMBEDDING_DEVICE=${PLAGIARISM_EMBEDDING_DEVICE:-auto}
      - EMBEDDING_BATCH_SIZE=${PLAGIARISM_EMBEDDING_BATCH_SIZE:-16}
      - OMP_NUM_THREADS=${PLAGIARISM_OMP_NUM_THREADS:-2}
      - MKL_NUM_THREADS=${PLAGIARISM_MKL_NUM_THREADS:-2}
      - TORCH_NUM_THREADS=${PLAGIARISM_TORCH_NUM_THREADS:-2}
      - CELERY_WORKER_PREFETCH_MULTIPLIER=1
      - C_FORCE_ROOT=true
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 3G
        reservations:
          cpus: '1.5'
          memory: 2G

  chromadb:
    image: chromadb/chroma:0.5.3
    container_name: cms-chromadb-prod
    restart: unless-stopped
    volumes:
      - chromadb_prod_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

volumes:
  mongodb_prod_data:
  redis_prod_data:
  chromadb_prod_data:
  ngrok_prod_data:
