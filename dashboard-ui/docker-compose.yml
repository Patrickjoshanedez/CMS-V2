version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dashboard-ui-app
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    restart: unless-stopped
    networks:
      - dashboard_network

  ngrok:
    image: ngrok/ngrok:3-alpine
    container_name: dashboard-ui-ngrok
    restart: unless-stopped
    environment:
      # You can provide your NGROK_AUTHTOKEN via a .env file or environment variable
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN:-}
    command:
      - http
      - app:3000
    depends_on:
      - app
    networks:
      - dashboard_network

networks:
  dashboard_network:
    driver: bridge
