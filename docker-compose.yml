services:
  mongodb:
    image: mongo:7
    container_name: cms-mongodb
    restart: unless-stopped
    volumes:
      - mongodb_data:/data/db
    networks:
      - cms_network

  redis:
    image: redis:7-alpine
    container_name: cms-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - cms_network

  localstack:
    image: localstack/localstack:latest
    container_name: cms-localstack
    restart: unless-stopped
    ports:
      - "4566:4566"
      - "4510-4559:4510-4559"
    environment:
      - SERVICES=s3
      - DEBUG=1
      - DATA_DIR=/var/lib/localstack/data
      - DOCKER_HOST=unix:///var/run/docker.sock
      - DEFAULT_REGION=us-east-1
    volumes:
      - localstack_data:/var/lib/localstack
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - cms_network

  # ── Plagiarism Engine Services ──────────────────────────────────────────
  plagiarism_redis:
    image: redis:7-alpine
    container_name: cms-plagiarism-redis
    restart: unless-stopped
    command: redis-server --save "" --appendonly no --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cms_network

  plagiarism_worker:
    build:
      context: ./plagiarism_engine
      dockerfile: Dockerfile
    container_name: cms-plagiarism-worker
    restart: unless-stopped
    command: >
      celery -A plagiarism_engine.tasks.celery_app worker
      --loglevel=info
      --concurrency=2
      --queues=plagiarism
    volumes:
      - plagiarism_chroma:/app/chroma_store
      - plagiarism_models:/root/.cache/torch/sentence_transformers
    environment:
      - CELERY_BROKER_URL=redis://plagiarism_redis:6379/0
      - CELERY_RESULT_BACKEND=redis://plagiarism_redis:6379/1
      - CHROMA_PERSIST_DIR=/app/chroma_store
      - EMBEDDING_MODEL=all-MiniLM-L6-v2
      - LOG_LEVEL=INFO
    depends_on:
      plagiarism_redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "celery", "-A", "plagiarism_engine.tasks.celery_app", "inspect", "ping"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 30s
    networks:
      - cms_network

  plagiarism_api:
    build:
      context: ./plagiarism_engine
      dockerfile: Dockerfile
    container_name: cms-plagiarism-api
    restart: unless-stopped
    command: >
      uvicorn plagiarism_engine.main:app
      --host 0.0.0.0
      --port 8001
      --workers 1
      --log-level info
    ports:
      - "8001:8001"
    volumes:
      - plagiarism_chroma:/app/chroma_store
      - plagiarism_models:/root/.cache/torch/sentence_transformers
    environment:
      - CELERY_BROKER_URL=redis://plagiarism_redis:6379/0
      - CELERY_RESULT_BACKEND=redis://plagiarism_redis:6379/1
      - CHROMA_PERSIST_DIR=/app/chroma_store
      - API_HOST=0.0.0.0
      - API_PORT=8001
      - CORS_ORIGINS=http://localhost:5173,http://localhost:5000
      - LOG_LEVEL=INFO
    depends_on:
      plagiarism_redis:
        condition: service_healthy
      plagiarism_worker:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - cms_network

  server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cms-server
    restart: unless-stopped
    depends_on:
      - mongodb
      - redis
      - localstack
      - plagiarism_api
    environment:
      NODE_ENV: development
      PORT: 5000
      MONGODB_URI: mongodb://mongodb:27017/cms_v2
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CLIENT_URL: http://localhost:5173
      JWT_ACCESS_SECRET: docker_access_secret_change_me
      JWT_REFRESH_SECRET: docker_refresh_secret_change_me
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      OTP_EXPIRES_MINUTES: 10
      S3_ENDPOINT: http://localstack:4566
      S3_BUCKET: cms-buksu-uploads
      S3_REGION: us-east-1
      S3_ACCESS_KEY_ID: test
      S3_SECRET_ACCESS_KEY: test
      S3_FORCE_PATH_STYLE: true
      PLAGIARISM_ENGINE_URL: http://plagiarism_api:8001
      PLAGIARISM_ENGINE_TIMEOUT: 120000
      PLAGIARISM_WARNING_THRESHOLD: 30
      PLAGIARISM_REJECT_THRESHOLD: 50
      PLAGIARISM_POLL_INTERVAL: 2000
      PLAGIARISM_POLL_MAX_ATTEMPTS: 60
      PLAGIARISM_RESULTS_TTL: 7776000
    ports:
      - "5000:5000"
    networks:
      - cms_network
    command: npm run dev:server
    volumes:
      - .:/app
      - /app/node_modules
      - /app/server/node_modules
      - /app/client/node_modules
      - /app/shared/node_modules

  client:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cms-client
    restart: unless-stopped
    depends_on:
      - server
    environment:
      VITE_API_URL: http://localhost:5000/api
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "5173:5173"
    command: npm run dev:client -- --host 0.0.0.0 --port 5173
    volumes:
      - .:/app
      - /app/node_modules
      - /app/server/node_modules
      - /app/client/node_modules
      - /app/shared/node_modules
    networks:
      - cms_network

volumes:
  mongodb_data:
  redis_data:
  localstack_data:
    driver: local
  plagiarism_chroma:
    driver: local
  plagiarism_models:
    driver: local

networks:
  cms_network:
    driver: bridge
