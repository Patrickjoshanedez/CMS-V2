x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  mongodb:
    image: mongo:7
    container_name: cms-mongodb
    restart: unless-stopped
    init: true
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping').ok", "--quiet" ]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 40s
    logging: *default-logging
    networks:
      - cms_network

  redis:
    image: redis:7-alpine
    container_name: cms-redis
    restart: unless-stopped
    init: true
    command: redis-server --save "" --appendonly no
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    logging: *default-logging
    networks:
      - cms_network

  localstack:
    image: localstack/localstack:2.0.2
    container_name: cms-localstack
    restart: unless-stopped
    init: true
    ports:
      - "127.0.0.1:4566:4566"
    environment:
      SERVICES: s3
      DEBUG: 0
      DATA_DIR: /var/lib/localstack/data
      DEFAULT_REGION: us-east-1
      DISABLE_MOTO_API_RESPONSES: 1
    volumes:
      - localstack_data:/var/lib/localstack
      - ./infra/init-aws.sh:/etc/localstack/init/ready.d/init-aws.sh
    healthcheck:
      test: [ "CMD", "curl", "-s", "-f", "http://localhost:4566/_localstack/health" ]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 15s
    logging: *default-logging
    networks:
      - cms_network

  localstack-ngrok:
    image: ngrok/ngrok:3.37.3-alpine
    container_name: cms-localstack-ngrok
    restart: unless-stopped
    profiles:
      - localstack-public
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
      NGROK_LOCALSTACK_DOMAIN: ${NGROK_LOCALSTACK_DOMAIN:-}
    entrypoint:
      - /bin/sh
      - -ec
    command:
      - |
        test -n "$${NGROK_AUTHTOKEN}" || { echo "missing NGROK_AUTHTOKEN"; exit 1; }
        if test -n "$${NGROK_LOCALSTACK_DOMAIN}"; then
          exec ngrok http --domain="$${NGROK_LOCALSTACK_DOMAIN}" localstack:4566 --log=stdout
        fi
        exec ngrok http localstack:4566 --log=stdout
    depends_on:
      localstack:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    logging: *default-logging
    networks:
      - cms_network

  plagiarism_redis:
    image: redis:7-alpine
    container_name: cms-plagiarism-redis
    restart: unless-stopped
    init: true
    command: redis-server --save "" --appendonly no --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    logging: *default-logging
    networks:
      - cms_network

  plagiarism_worker:
    build:
      context: ./plagiarism_engine
      dockerfile: Dockerfile
      args:
        TORCH_VARIANT: ${PLAGIARISM_TORCH_VARIANT:-cu121}
    container_name: cms-plagiarism-worker
    restart: unless-stopped
    init: true
    command: >
      celery -A plagiarism_engine.tasks.celery_app worker --loglevel=info --concurrency=${PLAGIARISM_WORKER_CONCURRENCY:-2} --max-tasks-per-child=${PLAGIARISM_MAX_TASKS_PER_CHILD:-100} --prefetch-multiplier=${PLAGIARISM_PREFETCH_MULTIPLIER:-1} --queues=plagiarism
    volumes:
      - plagiarism_chroma:/app/chroma_store
      - plagiarism_models:/root/.cache/torch/sentence_transformers
    cpus: ${PLAGIARISM_WORKER_CPUS:-2.0}
    mem_limit: ${PLAGIARISM_WORKER_MEMORY_LIMIT:-3g}
    environment:
      CELERY_BROKER_URL: redis://plagiarism_redis:6379/0
      CELERY_RESULT_BACKEND: redis://plagiarism_redis:6379/1
      CHROMA_PERSIST_DIR: /app/chroma_store
      EMBEDDING_MODEL: all-MiniLM-L6-v2
      EMBEDDING_DEVICE: ${PLAGIARISM_EMBEDDING_DEVICE:-auto}
      EMBEDDING_BATCH_SIZE: ${PLAGIARISM_EMBEDDING_BATCH_SIZE:-24}
      OMP_NUM_THREADS: ${PLAGIARISM_OMP_NUM_THREADS:-2}
      MKL_NUM_THREADS: ${PLAGIARISM_MKL_NUM_THREADS:-2}
      TORCH_NUM_THREADS: ${PLAGIARISM_TORCH_NUM_THREADS:-2}
      LOG_LEVEL: INFO
    depends_on:
      plagiarism_redis:
        condition: service_healthy
    healthcheck:
      disable: true
    logging: *default-logging
    networks:
      - cms_network

  plagiarism_api:
    build:
      context: ./plagiarism_engine
      dockerfile: Dockerfile
      args:
        TORCH_VARIANT: ${PLAGIARISM_TORCH_VARIANT:-cu121}
    container_name: cms-plagiarism-api
    restart: unless-stopped
    init: true
    command: >
      uvicorn plagiarism_engine.main:app --host 0.0.0.0 --port 8001 --workers ${PLAGIARISM_API_WORKERS:-1} --limit-concurrency ${PLAGIARISM_API_LIMIT_CONCURRENCY:-32} --log-level info
    ports:
      - "8001:8001"
    volumes:
      - plagiarism_chroma:/app/chroma_store
      - plagiarism_models:/root/.cache/torch/sentence_transformers
    cpus: ${PLAGIARISM_API_CPUS:-1.5}
    mem_limit: ${PLAGIARISM_API_MEMORY_LIMIT:-2g}
    environment:
      CELERY_BROKER_URL: redis://plagiarism_redis:6379/0
      CELERY_RESULT_BACKEND: redis://plagiarism_redis:6379/1
      CHROMA_PERSIST_DIR: /app/chroma_store
      EMBEDDING_DEVICE: ${PLAGIARISM_EMBEDDING_DEVICE:-auto}
      EMBEDDING_BATCH_SIZE: ${PLAGIARISM_EMBEDDING_BATCH_SIZE:-24}
      OMP_NUM_THREADS: ${PLAGIARISM_OMP_NUM_THREADS:-2}
      MKL_NUM_THREADS: ${PLAGIARISM_MKL_NUM_THREADS:-2}
      TORCH_NUM_THREADS: ${PLAGIARISM_TORCH_NUM_THREADS:-2}
      API_HOST: 0.0.0.0
      API_PORT: "8001"
      APP_CORS_ORIGINS: "http://localhost:43211,http://localhost:43210,http://cms-client:43211,${CLIENT_URL:-}"
      LOG_LEVEL: INFO
    depends_on:
      plagiarism_redis:
        condition: service_healthy
      plagiarism_worker:
        condition: service_started
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8001/health" ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging: *default-logging
    networks:
      - cms_network

  server:
    build:
      context: .
      dockerfile: Dockerfile
    image: cms-v2-dev-base
    container_name: cms-server
    restart: unless-stopped
    init: true
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      localstack:
        condition: service_healthy
      plagiarism_api:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: "43210"
      STORAGE_MODE: ${STORAGE_MODE:-filesystem}
      STORAGE_LOCAL_PATH: ${STORAGE_LOCAL_PATH:-/app/uploads}
      MONGODB_URI: mongodb://mongodb:27017/cms_v2
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ""
      CLIENT_URL: http://localhost:43211
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      OTP_EXPIRES_MINUTES: "10"
      S3_ENDPOINT: http://localstack:4566
      S3_BUCKET: cms-buksu-uploads
      S3_REGION: us-east-1
      S3_ACCESS_KEY_ID: test
      S3_SECRET_ACCESS_KEY: test
      S3_FORCE_PATH_STYLE: "true"
      S3_PUBLIC_URL: ${S3_PUBLIC_URL:-}
      PLAGIARISM_ENGINE_URL: http://plagiarism_api:8001
      PLAGIARISM_ENGINE_TIMEOUT: "120000"
      PLAGIARISM_WARNING_THRESHOLD: "30"
      PLAGIARISM_REJECT_THRESHOLD: "50"
      PLAGIARISM_POLL_INTERVAL: "2000"
      PLAGIARISM_POLL_MAX_ATTEMPTS: "60"
      PLAGIARISM_RESULTS_TTL: "7776000"
    ports:
      - "5000:5000"
    volumes:
      - .:/app
      - ./uploads:/app/uploads
      - workspace_node_modules:/app/node_modules
      - server_node_modules:/app/server/node_modules
      - client_node_modules:/app/client/node_modules
      - shared_node_modules:/app/shared/node_modules
    command: npm run dev:server
    healthcheck:
      test: [ "CMD", "node", "-e", "require('http').get('http://localhost:43210/api/health',(r)=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    logging: *default-logging
    networks:
      - cms_network

  client:
    build:
      context: .
      dockerfile: Dockerfile
    image: cms-v2-dev-base
    container_name: cms-client
    restart: unless-stopped
    init: true
    depends_on:
      server:
        condition: service_healthy
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:43210/api}
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "43211:43211"
    volumes:
      - .:/app
      - workspace_node_modules:/app/node_modules
      - server_node_modules:/app/server/node_modules
      - client_node_modules:/app/client/node_modules
      - shared_node_modules:/app/shared/node_modules
    command: npm run dev:client -- --host 0.0.0.0 --port 43211 --strictPort
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:43211" ]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging: *default-logging
    networks:
      - cms_network

volumes:
  mongodb_data:
  redis_data:
  localstack_data:
    driver: local
  plagiarism_chroma:
    driver: local
  plagiarism_models:
    driver: local
  workspace_node_modules:
  server_node_modules:
  client_node_modules:
  shared_node_modules:

networks:
  cms_network:
    driver: bridge
