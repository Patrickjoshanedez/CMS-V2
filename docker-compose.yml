# -------------------------------------------------------------------------------
#  CMS V2 — All-in-One Docker Compose  (Local Development)
#  Services: MongoDB · Redis · LocalStack S3 · Plagiarism Engine · API · WebUI
#
#  Start:  .\start-cms.ps1  (auto-debug)
#    — or — docker-compose up -d --build
# -------------------------------------------------------------------------------

services:

  # --- Infrastructure ----------------------------------------------------------

  mongodb:
    image: mongo:7
    container_name: cms-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping').ok", "--quiet" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - cms_network

  redis:
    image: redis:7-alpine
    container_name: cms-redis
    restart: unless-stopped
    command: redis-server --save "" --appendonly no
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - cms_network

  localstack:
    image: localstack/localstack:2.0.2
    container_name: cms-localstack
    restart: unless-stopped
    ports:
      - "127.0.0.1:4566:4566"
    environment:
      SERVICES: s3
      DEBUG: 1
      DATA_DIR: /var/lib/localstack/data
      DEFAULT_REGION: us-east-1
      RUNTIME_ENDPOINTS: http://localhost:9001
      DISABLE_MOTO_API_RESPONSES: 1
    volumes:
      - localstack_data:/var/lib/localstack
      - ./infra/init-aws.sh:/etc/localstack/init/ready.d/init-aws.sh
    healthcheck:
      test: [ "CMD", "curl", "-s", "-f", "http://localhost:4566/_localstack/health" ]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 15s
    networks:
      - cms_network

  # LocalStack S3 ngrok tunnel for external access (mobile apps, webhooks)
  # Start with: docker compose --profile localstack-public up -d
  localstack-ngrok:
    image: ngrok/ngrok:latest
    container_name: cms-localstack-ngrok
    restart: unless-stopped
    profiles:
      - localstack-public
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
      NGROK_LOCALSTACK_DOMAIN: ${NGROK_LOCALSTACK_DOMAIN:-}
    entrypoint:
      - /bin/sh
      - -ec
    command:
      - |
        test -n "$${NGROK_AUTHTOKEN}" || { echo "missing NGROK_AUTHTOKEN"; exit 1; }
        if test -n "$${NGROK_LOCALSTACK_DOMAIN}"; then
          exec ngrok http --domain="$${NGROK_LOCALSTACK_DOMAIN}" localstack:4566 --log=stdout
        fi
        exec ngrok http localstack:4566 --log=stdout
    depends_on:
      localstack:
        condition: service_healthy
    networks:
      - cms_network

  # --- Plagiarism Engine -------------------------------------------------------

  plagiarism_redis:
    image: redis:7-alpine
    container_name: cms-plagiarism-redis
    restart: unless-stopped
    command: redis-server --save "" --appendonly no --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - cms_network

  plagiarism_worker:
    build:
      context: ./plagiarism_engine
      dockerfile: Dockerfile
      args:
        TORCH_VARIANT: ${PLAGIARISM_TORCH_VARIANT:-cu121}
    container_name: cms-plagiarism-worker
    restart: unless-stopped
    command: >
      celery -A plagiarism_engine.tasks.celery_app worker --loglevel=info --concurrency=${PLAGIARISM_WORKER_CONCURRENCY:-2} --max-tasks-per-child=${PLAGIARISM_MAX_TASKS_PER_CHILD:-100} --prefetch-multiplier=${PLAGIARISM_PREFETCH_MULTIPLIER:-1} --queues=plagiarism
    volumes:
      - plagiarism_chroma:/app/chroma_store
      - plagiarism_models:/root/.cache/torch/sentence_transformers
    cpus: ${PLAGIARISM_WORKER_CPUS:-2.0}
    mem_limit: ${PLAGIARISM_WORKER_MEMORY_LIMIT:-3g}
    # GPU is optional at runtime; keep image CUDA-capable but avoid hard runtime requirement.
    environment:
      CELERY_BROKER_URL: redis://plagiarism_redis:6379/0
      CELERY_RESULT_BACKEND: redis://plagiarism_redis:6379/1
      CHROMA_PERSIST_DIR: /app/chroma_store
      EMBEDDING_MODEL: all-MiniLM-L6-v2
      EMBEDDING_DEVICE: ${PLAGIARISM_EMBEDDING_DEVICE:-auto}
      EMBEDDING_BATCH_SIZE: ${PLAGIARISM_EMBEDDING_BATCH_SIZE:-24}
      OMP_NUM_THREADS: ${PLAGIARISM_OMP_NUM_THREADS:-2}
      MKL_NUM_THREADS: ${PLAGIARISM_MKL_NUM_THREADS:-2}
      TORCH_NUM_THREADS: ${PLAGIARISM_TORCH_NUM_THREADS:-2}
      LOG_LEVEL: INFO
    depends_on:
      plagiarism_redis:
        condition: service_healthy
    healthcheck:
      disable: true
    networks:
      - cms_network

  plagiarism_api:
    build:
      context: ./plagiarism_engine
      dockerfile: Dockerfile
      args:
        TORCH_VARIANT: ${PLAGIARISM_TORCH_VARIANT:-cu121}
    container_name: cms-plagiarism-api
    restart: unless-stopped
    command: >
      uvicorn plagiarism_engine.main:app --host 0.0.0.0 --port 8001 --workers ${PLAGIARISM_API_WORKERS:-1} --limit-concurrency ${PLAGIARISM_API_LIMIT_CONCURRENCY:-32} --log-level info
    ports:
      - "8001:8001"
    volumes:
      - plagiarism_chroma:/app/chroma_store
      - plagiarism_models:/root/.cache/torch/sentence_transformers
    cpus: ${PLAGIARISM_API_CPUS:-1.5}
    mem_limit: ${PLAGIARISM_API_MEMORY_LIMIT:-2g}
    # GPU is optional at runtime; keep image CUDA-capable but avoid hard runtime requirement.
    environment:
      CELERY_BROKER_URL: redis://plagiarism_redis:6379/0
      CELERY_RESULT_BACKEND: redis://plagiarism_redis:6379/1
      CHROMA_PERSIST_DIR: /app/chroma_store
      EMBEDDING_DEVICE: ${PLAGIARISM_EMBEDDING_DEVICE:-auto}
      EMBEDDING_BATCH_SIZE: ${PLAGIARISM_EMBEDDING_BATCH_SIZE:-24}
      OMP_NUM_THREADS: ${PLAGIARISM_OMP_NUM_THREADS:-2}
      MKL_NUM_THREADS: ${PLAGIARISM_MKL_NUM_THREADS:-2}
      TORCH_NUM_THREADS: ${PLAGIARISM_TORCH_NUM_THREADS:-2}
      API_HOST: 0.0.0.0
      API_PORT: "8001"
      APP_CORS_ORIGINS: "http://localhost:5173,http://localhost:5000,http://cms-client:5173"
      LOG_LEVEL: INFO
    depends_on:
      plagiarism_redis:
        condition: service_healthy
      plagiarism_worker:
        condition: service_started
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8001/health" ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - cms_network

  # --- Application -------------------------------------------------------------

  server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cms-server
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      localstack:
        condition: service_healthy
      plagiarism_api:
        condition: service_started
    # NOTE: docker-compose environment: always beats dotenv, so the vars below
    # override whatever is in server/.env (which dotenv loads at runtime).
    # Non-infra vars (SMTP, Google OAuth) come from server/.env via dotenv.
    environment:
      NODE_ENV: development
      PORT: "5000"
      # -- Database (local container, NOT Atlas) ------------------------------
      MONGODB_URI: mongodb://mongodb:27017/cms_v2
      # -- Redis (container service name) ------------------------------------
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ""
      # -- App ---------------------------------------------------------------
      CLIENT_URL: http://localhost:5173
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      OTP_EXPIRES_MINUTES: "10"
      # -- LocalStack S3 (container endpoint) --------------------------------
      S3_ENDPOINT: http://localstack:4566
      S3_BUCKET: cms-buksu-uploads
      S3_REGION: us-east-1
      S3_ACCESS_KEY_ID: test
      S3_SECRET_ACCESS_KEY: test
      S3_FORCE_PATH_STYLE: "true"
      # Public URL for presigned URLs (ngrok tunnel) — set via .env or leave empty
      S3_PUBLIC_URL: ${S3_PUBLIC_URL:-}
      # -- Plagiarism Engine -------------------------------------------------
      PLAGIARISM_ENGINE_URL: http://plagiarism_api:8001
      PLAGIARISM_ENGINE_TIMEOUT: "120000"
      PLAGIARISM_WARNING_THRESHOLD: "30"
      PLAGIARISM_REJECT_THRESHOLD: "50"
      PLAGIARISM_POLL_INTERVAL: "2000"
      PLAGIARISM_POLL_MAX_ATTEMPTS: "60"
      PLAGIARISM_RESULTS_TTL: "7776000"
    ports:
      - "5000:5000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/server/node_modules
      - /app/client/node_modules
      - /app/shared/node_modules
    command: npm run dev:server
    healthcheck:
      test: [ "CMD", "node", "-e", "require('http').get('http://localhost:5000/api/health',(r)=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    networks:
      - cms_network

  client:
    build:
      context: .
      dockerfile: Dockerfile
    image: cms-v2-client-dev
    container_name: cms-client
    restart: unless-stopped
    depends_on:
      server:
        condition: service_healthy
    environment:
      VITE_API_URL: http://localhost:5000/api
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/server/node_modules
      - /app/client/node_modules
      - /app/shared/node_modules
    command: npm run dev:client -- --host 0.0.0.0 --port 5173
    networks:
      - cms_network

# --- Persistent Storage ---------------------------------------------------------

volumes:
  mongodb_data:
  redis_data:
  localstack_data:
    driver: local
  plagiarism_chroma:
    driver: local
  plagiarism_models:
    driver: local

# --- Network --------------------------------------------------------------------

networks:
  cms_network:
    driver: bridge
