# ─────────────────────────────────────────────────────────────────────────────
# CMS-V2 — Public Deploy Compose (Ngrok, No Auth Gate)
# ─────────────────────────────────────────────────────────────────────────────
# Purpose:  One-command deploy that exposes the full CMS stack to the internet
#           via ngrok with NO password/OAuth wall.  Visitors land directly on
#           the app.  Optimised for memory and disk efficiency.
#
# Usage:
#   .\deploy.ps1                         # interactive — generates secrets
#   docker compose --env-file .env.deploy -f docker-compose.deploy.yml up -d --build
#
# Requirements:
#   - .env.deploy  (auto-generated by deploy.ps1)
#   - NGROK_AUTHTOKEN set (free ngrok account is enough)
#   - NGROK_DOMAIN   set (claim a free static domain at dashboard.ngrok.com)
# ─────────────────────────────────────────────────────────────────────────────

name: cms-v2-deploy

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "5m"
    max-file: "2"

services:
  # ── MongoDB ────────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: cms-deploy-mongodb
    restart: unless-stopped
    init: true
    command:
      - mongod
      - --wiredTigerCacheSizeGB
      - "0.25"
      - --quiet
    volumes:
      - mongodb_deploy:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping').ok", "--quiet"]
      interval: 20s
      timeout: 10s
      retries: 6
      start_period: 30s
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: cms-deploy-redis
    restart: unless-stopped
    init: true
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --requirepass
      - ${REDIS_PASSWORD}
      - --maxmemory
      - 128mb
      - --maxmemory-policy
      - allkeys-lru
      - --save
      - ""
    volumes:
      - redis_deploy:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD ping"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 192M
        reservations:
          cpus: "0.1"
          memory: 64M

  # ── Server (Node API) ─────────────────────────────────────────────────────
  server:
    build:
      context: .
      dockerfile: Dockerfile.server.prod
    command: npm run start --workspace=server
    container_name: cms-deploy-server
    restart: unless-stopped
    init: true
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      plagiarism_api:
        condition: service_healthy
      ollama:
        condition: service_healthy
    env_file:
      - .env.deploy
    environment:
      NODE_ENV: production
      PORT: 5000
      NODE_OPTIONS: "--max-old-space-size=512"
      STORAGE_MODE: ${STORAGE_MODE:-filesystem}
      STORAGE_LOCAL_PATH: ${STORAGE_LOCAL_PATH:-/app/uploads}
      MONGODB_URI: ${MONGODB_URI:-mongodb://mongodb:27017/cms_v2}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      CLIENT_URL: ${CLIENT_URL}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      OTP_EXPIRES_MINUTES: ${OTP_EXPIRES_MINUTES:-10}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@cms-buksu.edu.ph}
      S3_BUCKET: ${S3_BUCKET:-cms-buksu-uploads}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-false}
      S3_PUBLIC_URL: ${S3_PUBLIC_URL:-}
      ALLOW_PRODUCTION_S3_BUCKET_OVERRIDE: "false"
      ALLOW_PRODUCTION_LOCALSTACK_TESTING: "false"
      PUBLIC_EXPOSURE_MODE: "true"
      PLAGIARISM_ENGINE_URL: http://plagiarism_api:8001
      PLAGIARISM_WARNING_THRESHOLD: ${PLAGIARISM_WARNING_THRESHOLD:-25}
      PLAGIARISM_REJECT_THRESHOLD: ${PLAGIARISM_REJECT_THRESHOLD:-40}
      PLAGIARISM_ENGINE_TIMEOUT: ${PLAGIARISM_ENGINE_TIMEOUT:-180000}
      PLAGIARISM_POLL_INTERVAL: ${PLAGIARISM_POLL_INTERVAL:-3000}
      PLAGIARISM_POLL_MAX_ATTEMPTS: ${PLAGIARISM_POLL_MAX_ATTEMPTS:-60}
      RECAPTCHA_SECRET_KEY: ${RECAPTCHA_SECRET_KEY:-}
      GOOGLE_AUTH_CLIENT_ID: ${GOOGLE_AUTH_CLIENT_ID:-}
      GOOGLE_AUTH_CLIENT_SECRET: ${GOOGLE_AUTH_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-}
      GOOGLE_REFRESH_TOKEN: ${GOOGLE_REFRESH_TOKEN:-}
      GOOGLE_SERVICE_ACCOUNT_EMAIL: ${GOOGLE_SERVICE_ACCOUNT_EMAIL:-}
      GOOGLE_SERVICE_ACCOUNT_PRIVATE_KEY: ${GOOGLE_SERVICE_ACCOUNT_PRIVATE_KEY:-}
      GOOGLE_DRIVE_FOLDER_ID: ${GOOGLE_DRIVE_FOLDER_ID:-}
      GOOGLE_DRIVE_CAPSTONE_DOCS_FOLDER_ID: ${GOOGLE_DRIVE_CAPSTONE_DOCS_FOLDER_ID:-}
      GOOGLE_DRIVE_TEMPLATE_FOLDER_ID: ${GOOGLE_DRIVE_TEMPLATE_FOLDER_ID:-}
      PDF_METADATA_ENABLE_GLM_OCR: ${PDF_METADATA_ENABLE_GLM_OCR:-true}
      PDF_METADATA_GLM_MODEL: ${PDF_METADATA_GLM_MODEL:-glm-ocr:latest}
      PDF_METADATA_GLM_STRATEGY: ${PDF_METADATA_GLM_STRATEGY:-always}
      PDF_METADATA_GLM_TEMPERATURE: ${PDF_METADATA_GLM_TEMPERATURE:-0.0}
      PDF_METADATA_GLM_TOP_P: ${PDF_METADATA_GLM_TOP_P:-0.2}
      PDF_METADATA_GLM_REPEAT_PENALTY: ${PDF_METADATA_GLM_REPEAT_PENALTY:-1.12}
      PDF_METADATA_GLM_PROMPT_MAX_CHARS: ${PDF_METADATA_GLM_PROMPT_MAX_CHARS:-8000}
      PDF_METADATA_GLM_TIMEOUT_MS: ${PDF_METADATA_GLM_TIMEOUT_MS:-20000}
      PDF_METADATA_ENABLE_DOI_ENRICHMENT: ${PDF_METADATA_ENABLE_DOI_ENRICHMENT:-true}
      PDF_METADATA_DOI_TIMEOUT_MS: ${PDF_METADATA_DOI_TIMEOUT_MS:-4000}
      PDF_METADATA_REVIEW_GATE_ENABLED: ${PDF_METADATA_REVIEW_GATE_ENABLED:-true}
      OLLAMA_HOST: ${OLLAMA_HOST:-http://ollama:11434}
      PLAGIARISM_OLLAMA_EMBED_MODEL: ${PLAGIARISM_OLLAMA_EMBED_MODEL:-nomic-embed-text-v2-moe:latest}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
      TRUST_PROXY: "true"
      COOKIE_SECURE: "true"
      COOKIE_SAME_SITE: "lax"
      ALLOW_NGROK_ORIGINS: "false"
    security_opt:
      - no-new-privileges:true
    volumes:
      - ./uploads:/app/uploads
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5000/api/health',(r)=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 45s
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 768M
        reservations:
          cpus: "0.25"
          memory: 256M

  # ── Client (Nginx + Vite build) ────────────────────────────────────────────
  client:
    build:
      context: .
      dockerfile: Dockerfile.client.prod
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
        VITE_RECAPTCHA_SITE_KEY: ${VITE_RECAPTCHA_SITE_KEY:-}
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:-}
        VITE_GOOGLE_ALLOWED_ORIGINS: ${VITE_GOOGLE_ALLOWED_ORIGINS:-}
        VITE_RECAPTCHA_ENABLED: ${VITE_RECAPTCHA_ENABLED:-false}
    container_name: cms-deploy-client
    restart: unless-stopped
    init: true
    depends_on:
      server:
        condition: service_healthy
    ports:
      - "8080:80"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    read_only: true
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /var/run
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 64M

  # ── Ngrok — NO AUTH (open access) ──────────────────────────────────────────
  ngrok:
    image: ngrok/ngrok:3-alpine
    container_name: cms-deploy-ngrok
    restart: unless-stopped
    init: true
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN:?NGROK_AUTHTOKEN is required}
      NGROK_DOMAIN: ${NGROK_DOMAIN:?NGROK_DOMAIN is required}
    entrypoint:
      - /bin/sh
      - -ec
    command:
      - |
        test -n "$${NGROK_AUTHTOKEN}" || { echo "FATAL: NGROK_AUTHTOKEN is empty"; exit 1; }
        test -n "$${NGROK_DOMAIN}" || { echo "FATAL: NGROK_DOMAIN is empty"; exit 1; }
        echo "┌──────────────────────────────────────────────────────────────┐"
        echo "│  ngrok tunnel starting — NO AUTH GATE                       │"
        echo "│  Public URL: https://$${NGROK_DOMAIN}                       │"
        echo "│  Anyone with the URL can access the CMS directly.           │"
        echo "└──────────────────────────────────────────────────────────────┘"
        exec ngrok http client:80 --url="https://$${NGROK_DOMAIN}" --log=stdout
    depends_on:
      client:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    volumes:
      - ngrok_deploy:/var/lib/ngrok
    tmpfs:
      - /tmp
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
        reservations:
          cpus: "0.05"
          memory: 32M

  # ── Plagiarism API (FastAPI) ───────────────────────────────────────────────
  plagiarism_api:
    build:
      context: ./plagiarism_engine
      dockerfile: Dockerfile
      args:
        TORCH_VARIANT: ${PLAGIARISM_TORCH_VARIANT:-cpu}
    container_name: cms-deploy-plagiarism-api
    restart: unless-stopped
    init: true
    depends_on:
      redis:
        condition: service_healthy
      chromadb:
        condition: service_healthy
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - ANONYMIZED_TELEMETRY=FALSE
      - LOG_LEVEL=WARNING
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD_URLENC}@redis:6379/1
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD_URLENC}@redis:6379/1
      - LOG_JSON=true
      - EMBEDDING_DEVICE=${PLAGIARISM_EMBEDDING_DEVICE:-cpu}
      - EMBEDDING_BATCH_SIZE=${PLAGIARISM_EMBEDDING_BATCH_SIZE:-8}
      - OMP_NUM_THREADS=${PLAGIARISM_OMP_NUM_THREADS:-1}
      - MKL_NUM_THREADS=${PLAGIARISM_MKL_NUM_THREADS:-1}
      - TORCH_NUM_THREADS=${PLAGIARISM_TORCH_NUM_THREADS:-1}
      - MAX_DOCUMENT_SIZE=20971520
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 512M

  # ── Plagiarism Worker (Celery) ─────────────────────────────────────────────
  plagiarism_worker:
    build:
      context: ./plagiarism_engine
      dockerfile: Dockerfile
      args:
        TORCH_VARIANT: ${PLAGIARISM_TORCH_VARIANT:-cpu}
    container_name: cms-deploy-plagiarism-worker
    restart: unless-stopped
    init: true
    command: >
      celery -A plagiarism_engine.tasks worker
      --loglevel=warning
      --concurrency=${PLAGIARISM_WORKER_CONCURRENCY:-1}
      --max-tasks-per-child=${PLAGIARISM_MAX_TASKS_PER_CHILD:-50}
      --prefetch-multiplier=1
    depends_on:
      redis:
        condition: service_healthy
      chromadb:
        condition: service_healthy
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - ANONYMIZED_TELEMETRY=FALSE
      - LOG_LEVEL=WARNING
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD_URLENC}@redis:6379/1
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD_URLENC}@redis:6379/1
      - EMBEDDING_DEVICE=${PLAGIARISM_EMBEDDING_DEVICE:-cpu}
      - EMBEDDING_BATCH_SIZE=${PLAGIARISM_EMBEDDING_BATCH_SIZE:-8}
      - OMP_NUM_THREADS=${PLAGIARISM_OMP_NUM_THREADS:-1}
      - MKL_NUM_THREADS=${PLAGIARISM_MKL_NUM_THREADS:-1}
      - TORCH_NUM_THREADS=${PLAGIARISM_TORCH_NUM_THREADS:-1}
      - C_FORCE_ROOT=true
    healthcheck:
      test: ["CMD-SHELL", "celery -A plagiarism_engine.tasks inspect ping -d celery@$$HOSTNAME || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 768M

  # ── ChromaDB (Vector Store) ────────────────────────────────────────────────
  chromadb:
    image: chromadb/chroma:0.5.3
    container_name: cms-deploy-chromadb
    restart: unless-stopped
    init: true
    volumes:
      - chromadb_deploy:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 25s
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M

  # ── Ollama (LLM / Embedding Models) ─────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: cms-deploy-ollama
    restart: unless-stopped
    init: true
    entrypoint:
      - /bin/sh
      - -ec
    command:
      - |
        # Start Ollama server in the background
        ollama serve &
        OLLAMA_PID=$$!

        # Wait for the API to be ready
        echo "Waiting for Ollama API..."
        until ollama list > /dev/null 2>&1; do
          sleep 1
        done
        echo "Ollama API ready."

        # Pull models if not already cached
        echo "Ensuring model: glm-ocr:latest ..."
        ollama pull glm-ocr:latest || echo "WARN: glm-ocr pull failed (non-fatal)"

        echo "Ensuring model: nomic-embed-text-v2-moe:latest ..."
        ollama pull nomic-embed-text-v2-moe:latest || echo "WARN: nomic-embed pull failed (non-fatal)"

        echo "All models ready."

        # Keep the server running in the foreground
        wait $$OLLAMA_PID
    volumes:
      - ollama_deploy:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 120s
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4G
        reservations:
          cpus: "0.5"
          memory: 1G

volumes:
  mongodb_deploy:
  redis_deploy:
  chromadb_deploy:
  ngrok_deploy:
  ollama_deploy:
