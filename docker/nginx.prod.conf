server {
    listen 80;
    server_name _;

    # Use Docker's embedded DNS so upstream hostnames are resolved at
    # request time instead of at nginx startup. Without this, nginx
    # crashes with "host not found in upstream" if the server container
    # is still initialising when the client container starts.
    resolver 127.0.0.11 valid=10s ipv6=off;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        set $upstream http://server:5000;
        proxy_pass $upstream/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /socket.io/ {
        set $upstream http://server:5000;
        proxy_pass $upstream/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
}
